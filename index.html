function renderStockCategories() {
  const chipsContainer = qs('#stock-header .scrollable-x');
  if (!chipsContainer) return;
  chipsContainer.innerHTML = `
    <div class="chip ${APP.stockCategoryFilter === null ? 'active' : ''}" onclick="APP.stockCategoryFilter=null;renderStockCategories();renderStockProducts();">All</div>
    ${APP.categories.map(c => `<div class="chip ${APP.stockCategoryFilter === c.id ? 'active' : ''}" onclick="APP.stockCategoryFilter='${c.id}';renderStockCategories();renderStockProducts();">${c.name}</div>`).join('')}
  `;
}

function renderStockProducts() {
  const content = $('stock-content');
  const locId = APP.activeStockLocation;
  let filtered = APP.products;
  if (APP.stockCategoryFilter) {
    filtered = filtered.filter(p => p.category_id === APP.stockCategoryFilter);
  }
  if (APP.stockSearchQuery) {
    const q = APP.stockSearchQuery.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.sku && p.sku.toLowerCase().includes(q)));
  }

  const totalProducts = filtered.length;
  const totalUnits = filtered.reduce((s, p) => s + getTotalLocationStock(p, locId), 0);
  let lowStockCount = 0;
  filtered.forEach(p => {
    if (p.variants) {
      p.variants.forEach(v => {
        const locQty = getLocationStockQty(locId, v.id);
        if (locQty <= (p.low_stock_threshold || 5)) lowStockCount++;
      });
    }
  });

  const locName = APP.stockLocations.find(l => l.id === locId)?.name || '';

  content.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <div style="flex:1;min-width:90px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:11px;color:var(--text-secondary);">Products</div>
        <div style="font-size:18px;font-weight:700;">${totalProducts}</div>
      </div>
      <div style="flex:1;min-width:90px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:11px;color:var(--text-secondary);">${locName} Units</div>
        <div style="font-size:18px;font-weight:700;">${totalUnits}</div>
      </div>
      <div style="flex:1;min-width:90px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:11px;color:var(--text-secondary);">Low Stock</div>
        <div style="font-size:18px;font-weight:700;color:${lowStockCount > 0 ? 'var(--warning)' : 'var(--success)'};">${lowStockCount}</div>
      </div>
    </div>

    ${filtered.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-secondary);">No products found</div>' : ''}

    ${filtered.map(p => {
      const totalStock = getTotalLocationStock(p, locId);
      const variants = p.variants || [];
      const lowVars = variants.filter(v => getLocationStockQty(locId, v.id) <= (p.low_stock_threshold || 5));
      const isExpanded = APP.expandedStockProducts[p.id];

      const colorsInProduct = {};
      const sizesInProduct = {};
      variants.forEach(v => {
        if (v.color) colorsInProduct[v.color.id] = v.color;
        if (v.size) sizesInProduct[v.size.id] = v.size;
      });
      const sortedColors = Object.values(colorsInProduct).sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const sortedSizes = Object.values(sizesInProduct).sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

      return `
        <div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;">
          <div style="padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;" onclick="toggleStockExpand('${p.id}')">
            <div style="color:var(--text-secondary);transition:transform 0.2s;transform:rotate(${isExpanded ? '90deg' : '0deg'});">▶</div>
            <div style="flex:1;min-width:0;">
              <div class="truncate" style="font-size:14px;font-weight:600;">${p.name}</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${p.category?.name || ''} • ${formatMoney(p.sell_price)}</div>
              ${lowVars.length > 0 ? `<div style="font-size:11px;color:var(--warning);margin-top:2px;">⚠️ ${lowVars.length} variant${lowVars.length > 1 ? 's' : ''} low stock</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:16px;font-weight:700;">${totalStock}</div>
              <div style="font-size:11px;color:var(--text-secondary);">📦 pcs</div>
            </div>
          </div>
          ${isExpanded ? `
          <div style="padding:0 14px 14px;border-top:1px solid var(--border);">
            ${hasRole('admin', 'manager') ? `<div style="display:flex;gap:8px;margin-top:12px;margin-bottom:8px;">
              <button class="btn btn-sm" style="font-size:12px;" onclick="openTransferModal('${p.id}')">🔄 Transfer Stock</button>
            </div>` : '<div style="margin-top:8px;"></div>'}
            ${sortedColors.length > 0 && sortedSizes.length > 0 ? `
            <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
              <table style="width:100%;border-collapse:collapse;min-width:${sortedColors.length * 60 + 60}px;">
                <thead>
                  <tr>
                    <th style="text-align:left;padding:6px 4px;font-size:11px;color:var(--text-secondary);font-weight:600;"></th>
                    ${sortedColors.map(c => `<th style="text-align:center;padding:6px 4px;font-size:11px;font-weight:600;">
                      <div style="width:16px;height:16px;border-radius:50%;background:${c.hex_code || '#666'};display:inline-block;margin-bottom:2px;border:1px solid var(--border);"></div>
                      <div>${c.name ? c.name.substring(0, 3).toUpperCase() : ''}</div>
                    </th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  ${sortedSizes.map(s => `
                    <tr>
                      <td style="font-size:13px;font-weight:600;padding:4px;">${s.name}</td>
                      ${sortedColors.map(c => {
                        const variant = variants.find(v => v.size?.id === s.id && v.color?.id === c.id);
                        if (!variant) return '<td style="text-align:center;padding:4px;font-size:12px;color:var(--text-secondary);">-</td>';
                        const qty = getLocationStockQty(locId, variant.id);
                        const threshold = p.low_stock_threshold || 5;
                        const cls = qty === 0 ? 'stock-zero' : qty <= threshold ? 'stock-low' : 'stock-ok';
                        return hasRole('admin', 'manager') ?
                          `<td class="stock-cell ${cls}" onclick="openRestockModal('${p.id}','${variant.id}','${p.name}','${s.name}','${c.name}',${qty})">${qty === 0 ? '🔴' : qty <= threshold ? '⚠️' + qty : qty}</td>` :
                          `<td class="stock-cell ${cls}" style="cursor:default;">${qty === 0 ? '🔴' : qty <= threshold ? '⚠️' + qty : qty}</td>`;
                      }).join('')}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
            ` : '<div style="padding:12px;text-align:center;color:var(--text-secondary);font-size:13px;">No variants configured</div>'}
          </div>
          ` : ''}
        </div>
      `;
    }).join('')}
  `;
}

function toggleStockExpand(productId) {
  APP.expandedStockProducts[productId] = !APP.expandedStockProducts[productId];
  renderStockProducts();
}

// ===================== RESTOCK MODAL =====================
let restockState = { productId: '', variantId: '', productName: '', sizeName: '', colorName: '', currentQty: 0, addQty: 1, note: '', mode: 'add', setQty: 0, locationId: null, sourceLocationId: 'production', availableSources: [], maxSourceQty: 99999 };

function openRestockModal(productId, variantId, productName, sizeName, colorName, currentQty) {
  if (!hasRole('admin', 'manager')) { showToast('You do not have permission to restock', 'warning'); return; }
  const qty = parseInt(currentQty);
  const locId = APP.activeStockLocation;
  const currentLoc = APP.stockLocations.find(l => l.id === locId);
  const isHQ = currentLoc && currentLoc.name.toLowerCase().includes('hq');

  // Build available source locations
  const sources = [];
  if (isHQ) {
    sources.push({ id: 'production', name: '🏭 Production (New Stock)' });
  }
  // Add other locations that have this variant in stock
  APP.stockLocations.forEach(l => {
    if (l.id !== locId) {
      const srcQty = getLocationStockQty(l.id, variantId);
      if (srcQty > 0) {
        sources.push({ id: l.id, name: `${l.name} (${srcQty} available)`, qty: srcQty });
      }
    }
  });

  const defaultSource = sources.length > 0 ? sources[0].id : null;
  const maxSrc = defaultSource === 'production' ? 99999 : (sources.length > 0 ? (sources[0].qty || 99999) : 0);

  restockState = { productId, variantId, productName, sizeName, colorName, currentQty: qty, addQty: 1, note: '', mode: 'add', setQty: qty, locationId: locId, sourceLocationId: defaultSource, availableSources: sources, maxSourceQty: maxSrc };
  renderRestockModal();
}

function renderRestockModal() {
  const mode = restockState.mode;
  const diff = restockState.setQty - restockState.currentQty;
  const diffLabel = diff > 0 ? `<span style="color:var(--success);">Change: +${diff}</span>` : diff < 0 ? `<span style="color:var(--danger);">Change: ${diff}</span>` : `<span style="color:var(--text-secondary);">No change</span>`;

  const noSource = restockState.availableSources.length === 0;
  const sourceHTML = noSource ? `
      <div style="padding:12px;background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);border-radius:8px;margin-bottom:16px;">
        <div style="font-size:13px;color:var(--warning);font-weight:600;">⚠️ No Stock Available</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">No other location has stock for this variant. Add stock at HQ from Production first.</div>
      </div>` : `
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Restock From *</label>
        <select class="input" onchange="changeRestockSource(this.value)">
          ${restockState.availableSources.map(s => `<option value="${s.id}" ${restockState.sourceLocationId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
        </select>
        ${restockState.sourceLocationId !== 'production' ? '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">⚠️ Stock will be deducted from source location</div>' : ''}
      </div>`;

  const addModeHTML = `
      ${sourceHTML}
      ${noSource ? '' : `<div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px;">Quantity to Add${restockState.sourceLocationId !== 'production' ? ' (max: ' + restockState.maxSourceQty + ')' : ''}</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="qty-control">
            <button class="qty-btn" onclick="restockQty(-1)">−</button>
            <div class="qty-value">${restockState.addQty}</div>
            <button class="qty-btn" onclick="restockQty(1)">+</button>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="restockQty(-10)" style="font-size:12px;">-10</button>
            <button class="qty-btn" onclick="restockQty(10)" style="font-size:12px;">+10</button>
          </div>
        </div>
        <div style="margin-top:8px;font-size:13px;color:var(--success);">New stock: ${restockState.currentQty + restockState.addQty}</div>
      </div>`}`;

  const setModeHTML = `
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px;">Set Stock To</label>
        <input type="number" class="input" id="restock-set-qty" value="${restockState.setQty}" min="0" oninput="updateSetQty(this.value)" style="font-size:18px;font-weight:700;text-align:center;margin-bottom:8px;">
        <div style="font-size:13px;" id="restock-diff-label">${diffLabel}</div>
      </div>`;

  const confirmBtnAdd = noSource
    ? `<button class="btn btn-success btn-block btn-lg" disabled style="opacity:0.5;">⚠️ No Source Available</button>`
    : `<button class="btn btn-success btn-block btn-lg" onclick="confirmRestock()">✅ Confirm Restock (+${restockState.addQty})</button>`;
  const confirmBtnSet = `<button class="btn btn-primary btn-block btn-lg" onclick="confirmRestock()"${diff === 0 ? ' disabled style="opacity:0.5;"' : ''}>✅ Confirm Adjustment</button>`;

  const html = `
    <div class="modal-handle"></div>
    <div style="padding:20px;padding-bottom:calc(20px + var(--safe-bottom));">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:4px;">Stock Adjustment</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">${restockState.productName} — ${restockState.sizeName} / ${restockState.colorName}</p>

      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn ${mode === 'add' ? 'btn-primary' : ''}" style="flex:1;font-size:13px;padding:10px 0;" onclick="restockState.mode='add';renderRestockModal()">➕ Add Stock</button>
        <button class="btn ${mode === 'set' ? 'btn-primary' : ''}" style="flex:1;font-size:13px;padding:10px 0;" onclick="restockState.mode='set';restockState.setQty=restockState.currentQty;renderRestockModal()">✏️ Set Stock</button>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg-card);border-radius:8px;margin-bottom:16px;">
        <span style="font-size:13px;color:var(--text-secondary);">Current Stock</span>
        <span style="font-size:18px;font-weight:700;color:${restockState.currentQty === 0 ? 'var(--danger)' : 'var(--text-primary)'};">${restockState.currentQty}</span>
      </div>

      ${mode === 'add' ? addModeHTML : setModeHTML}

      <div style="margin-bottom:20px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Note (optional)</label>
        <input type="text" class="input" placeholder="${mode === 'add' ? 'e.g. New shipment' : 'e.g. Stocktake correction'}" value="${restockState.note}" oninput="restockState.note=this.value">
      </div>

      ${mode === 'add' ? confirmBtnAdd : confirmBtnSet}
    </div>
  `;

  const existing = $('restock-modal');
  if (existing) {
    existing.innerHTML = html;
  } else {
    openModal(html, 'sheet', 'restock-modal');
  }
}

function restockQty(delta) {
  const max = restockState.maxSourceQty;
  restockState.addQty = Math.max(1, Math.min(max, restockState.addQty + delta));
  renderRestockModal();
}

function changeRestockSource(sourceId) {
  restockState.sourceLocationId = sourceId;
  if (sourceId === 'production') {
    restockState.maxSourceQty = 99999;
  } else {
    const src = restockState.availableSources.find(s => s.id === sourceId);
    restockState.maxSourceQty = src ? (src.qty || getLocationStockQty(sourceId, restockState.variantId)) : 0;
  }
  restockState.addQty = Math.max(1, Math.min(restockState.addQty, restockState.maxSourceQty));
  renderRestockModal();
}

function updateSetQty(val) {
  restockState.setQty = Math.max(0, parseInt(val) || 0);
  const diff = restockState.setQty - restockState.currentQty;
  const label = document.getElementById('restock-diff-label');
  if (label) {
    label.innerHTML = diff > 0 ? `<span style="color:var(--success);">Change: +${diff}</span>` : diff < 0 ? `<span style="color:var(--danger);">Change: ${diff}</span>` : `<span style="color:var(--text-secondary);">No change</span>`;
  }
  // Update button state
  const modal = $('restock-modal');
  if (modal) {
    const btn = modal.querySelector('.btn-primary.btn-block');
    if (btn && restockState.mode === 'set') {
      btn.disabled = diff === 0;
      btn.style.opacity = diff === 0 ? '0.5' : '1';
    }
  }
}

async function confirmRestock() {
  try {
    const locId = restockState.locationId;
    if (restockState.mode === 'add') {
      const sourceName = restockState.sourceLocationId === 'production'
        ? 'Production'
        : (APP.stockLocations.find(l => l.id === restockState.sourceLocationId)?.name || 'Unknown');

      if (restockState.sourceLocationId === 'production') {
        // New stock from production — just increment at HQ
        const { error: isErr } = await db.rpc('increment_location_stock', { p_variant_id: restockState.variantId, p_location_id: locId, p_qty: restockState.addQty });
        if (isErr) throw isErr;
        await db.from('stock_log').insert({
          product_id: restockState.productId,
          variant_id: restockState.variantId,
          change_qty: restockState.addQty,
          reason: 'restock',
          staff_id: APP.currentStaff.id,
          notes: (restockState.note ? restockState.note + ' — ' : '') + 'From Production',
          location_id: locId,
        });
      } else {
        // Restock from another location — transfer (deducts source)
        const { error } = await db.rpc('transfer_stock', {
          p_variant_id: restockState.variantId,
          p_from_location: restockState.sourceLocationId,
          p_to_location: locId,
          p_qty: restockState.addQty,
        });
        if (error) throw error;
        const destName = APP.stockLocations.find(l => l.id === locId)?.name || 'Unknown';
        await db.from('stock_log').insert({
          product_id: restockState.productId,
          variant_id: restockState.variantId,
          change_qty: 0,
          reason: 'transfer',
          staff_id: APP.currentStaff.id,
          notes: `Restock ${restockState.addQty} from ${sourceName} to ${destName}` + (restockState.note ? ` — ${restockState.note}` : ''),
          location_id: restockState.sourceLocationId,
        });
      }

      logActivity('restock', `Restocked +${restockState.addQty} from ${sourceName}`, { locationId: locId, metadata: { qty: restockState.addQty, source: sourceName, variant_id: restockState.variantId } });

      closeModal('restock-modal');
      showToast(`Restocked +${restockState.addQty} from ${sourceName}`, 'success');
    } else {
      const diff = restockState.setQty - restockState.currentQty;
      if (diff === 0) {
        closeModal('restock-modal');
        showToast('No change needed', 'info');
        return;
      }

      const { data: diffResult, error: setErr } = await db.rpc('set_location_stock', { p_variant_id: restockState.variantId, p_location_id: locId, p_new_qty: restockState.setQty });
      if (setErr) throw setErr;

      await db.from('stock_log').insert({
        product_id: restockState.productId,
        variant_id: restockState.variantId,
        change_qty: diff,
        reason: 'adjustment',
        staff_id: APP.currentStaff.id,
        notes: restockState.note || null,
        location_id: locId,
      });

      logActivity('set_stock', `Stock set to ${restockState.setQty} (${diff > 0 ? '+' : ''}${diff})`, { locationId: locId, metadata: { new_qty: restockState.setQty, diff, variant_id: restockState.variantId } });

      closeModal('restock-modal');
      showToast(`Stock set to ${restockState.setQty} (${diff > 0 ? '+' : ''}${diff})`, 'success');
    }
    await loadProducts();
    await loadLocationStock();
    renderStockProducts();
  } catch (err) {
    showToast('Stock update failed: ' + err.message, 'error');
  }
}

// ===================== STOCK TRANSFER =====================
let transferState = { productId: '', variantId: '', fromLocation: '', toLocation: '', qty: 1, maxQty: 0 };

function openTransferModal(productId) {
  if (!hasRole('admin', 'manager')) { showToast('You do not have permission to transfer stock', 'warning'); return; }
  const product = APP.products.find(p => p.id === productId);
  if (!product || !product.variants || product.variants.length === 0) {
    showToast('No variants to transfer', 'warning');
    return;
  }
  const fromLoc = APP.activeStockLocation;
  const toLocs = APP.stockLocations.filter(l => l.id !== fromLoc);
  if (toLocs.length === 0) {
    showToast('Need at least 2 locations to transfer', 'warning');
    return;
  }
  
  // Pick first variant with stock at current location
  let firstVariant = null;
  for (const v of product.variants) {
    if (getLocationStockQty(fromLoc, v.id) > 0) { firstVariant = v; break; }
  }
  if (!firstVariant) firstVariant = product.variants[0];

  transferState = {
    productId,
    product,
    variantId: firstVariant.id,
    fromLocation: fromLoc,
    toLocation: toLocs[0].id,
    qty: 1,
    maxQty: getLocationStockQty(fromLoc, firstVariant.id),
  };
  renderTransferModal();
}

function renderTransferModal() {
  const p = transferState.product;
  const variants = p.variants || [];
  const fromLoc = APP.stockLocations.find(l => l.id === transferState.fromLocation);
  const toLocs = APP.stockLocations.filter(l => l.id !== transferState.fromLocation);

  const html = `
    <div class="modal-handle"></div>
    <div style="padding:20px;padding-bottom:calc(20px + var(--safe-bottom));">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:4px;">🔄 Transfer Stock</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">${p.name}</p>

      <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Variant</label>
      <select class="input" style="margin-bottom:12px;" onchange="transferSelectVariant(this.value)">
        ${variants.map(v => {
          const locQty = getLocationStockQty(transferState.fromLocation, v.id);
          return `<option value="${v.id}" ${transferState.variantId === v.id ? 'selected' : ''}>${v.size?.name || '?'} / ${v.color?.name || '?'} (${locQty} at ${fromLoc?.name})</option>`;
        }).join('')}
      </select>

      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:11px;color:var(--text-secondary);">From</div>
          <div style="font-size:14px;font-weight:700;">${fromLoc?.name || '?'}</div>
          <div style="font-size:12px;color:var(--accent);">${transferState.maxQty} pcs</div>
        </div>
        <div style="display:flex;align-items:center;font-size:20px;color:var(--text-secondary);">→</div>
        <div style="flex:1;">
          <select class="input" onchange="transferState.toLocation=this.value;renderTransferModal();">
            ${toLocs.map(l => `<option value="${l.id}" ${transferState.toLocation === l.id ? 'selected' : ''}>${l.name}</option>`).join('')}
          </select>
        </div>
      </div>

      <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px;">Quantity to Transfer</label>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div class="qty-control">
          <button class="qty-btn" onclick="transferQty(-1)">−</button>
          <div class="qty-value">${transferState.qty}</div>
          <button class="qty-btn" onclick="transferQty(1)">+</button>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="transferQty(-10)" style="font-size:12px;">-10</button>
          <button class="qty-btn" onclick="transferQty(10)" style="font-size:12px;">+10</button>
        </div>
        <button class="btn btn-sm" onclick="transferState.qty=transferState.maxQty;renderTransferModal();">All</button>
      </div>

      <button class="btn btn-primary btn-block btn-lg" ${transferState.maxQty === 0 || transferState.qty === 0 ? 'disabled style="opacity:0.5;"' : ''} onclick="confirmTransfer()">
        🔄 Transfer ${transferState.qty} unit${transferState.qty !== 1 ? 's' : ''}
      </button>
    </div>
  `;

  const existing = $('transfer-modal');
  if (existing) { existing.innerHTML = html; }
  else { openModal(html, 'sheet', 'transfer-modal'); }
}

function transferSelectVariant(variantId) {
  transferState.variantId = variantId;
  transferState.maxQty = getLocationStockQty(transferState.fromLocation, variantId);
  transferState.qty = Math.min(transferState.qty, transferState.maxQty);
  if (transferState.qty < 1 && transferState.maxQty > 0) transferState.qty = 1;
  renderTransferModal();
}

function transferQty(delta) {
  transferState.qty = Math.max(0, Math.min(transferState.maxQty, transferState.qty + delta));
  renderTransferModal();
}

async function confirmTransfer() {
  try {
    const { error } = await db.rpc('transfer_stock', {
      p_variant_id: transferState.variantId,
      p_from_location: transferState.fromLocation,
      p_to_location: transferState.toLocation,
      p_qty: transferState.qty,
    });
    if (error) throw error;

    const fromName = APP.stockLocations.find(l => l.id === transferState.fromLocation)?.name;
    const toName = APP.stockLocations.find(l => l.id === transferState.toLocation)?.name;

    await db.from('stock_log').insert({
      product_id: transferState.productId,
      variant_id: transferState.variantId,
      change_qty: 0,
      reason: 'transfer',
      staff_id: APP.currentStaff.id,
      notes: `Transfer ${transferState.qty} from ${fromName} to ${toName}`,
      location_id: transferState.fromLocation,
    });

    logActivity('transfer', `Transferred ${transferState.qty} units from ${fromName} to ${toName}`, { locationId: transferState.fromLocation, metadata: { qty: transferState.qty, from: fromName, to: toName, variant_id: transferState.variantId } });

    closeModal('transfer-modal');
    showToast(`Transferred ${transferState.qty} units to ${toName}`, 'success');
    await loadProducts();
    await loadLocationStock();
    renderStockProducts();
  } catch (err) {
    showToast('Transfer failed: ' + err.message, 'error');
  }
}

      id: product.id,
      name: product.name,
      categoryId: product.category_id || '',
      sku: product.sku || '',
      costPrice: product.cost_price || '',
      sellPrice: product.sell_price || '',
      lowStockThreshold: product.low_stock_threshold || 5,
      imageUrl: product.image_url || '',
      selectedColors: [...new Set((product.variants || []).map(v => v.color?.id).filter(Boolean))],
      selectedSizes: [...new Set((product.variants || []).map(v => v.size?.id).filter(Boolean))],

function toggleProductColor(colorId) {
  const idx = productFormState.selectedColors.indexOf(colorId);
  if (idx >= 0) productFormState.selectedColors.splice(idx, 1);
  else productFormState.selectedColors.push(colorId);
  renderProductFormModal();
}

function toggleProductSize(sizeId) {
  const idx = productFormState.selectedSizes.indexOf(sizeId);
  if (idx >= 0) productFormState.selectedSizes.splice(idx, 1);
  else productFormState.selectedSizes.push(sizeId);
  renderProductFormModal();
}

function handleProductImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > 800) { h = Math.round(h * 800 / w); w = 800; }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      productFormState.imageUrl = canvas.toDataURL('image/jpeg', 0.6);
      renderProductFormModal();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveProduct() {
  if (!productFormState.name.trim()) { showToast('Product name is required', 'warning'); return; }
  if (productFormState.saving) return;
  productFormState.saving = true;
  renderProductFormModal();

  try {
    const productData = {
      name: productFormState.name.trim(),
      category_id: productFormState.categoryId || null,
      sku: productFormState.sku.trim() || null,
      cost_price: parseFloat(productFormState.costPrice) || 0,
      sell_price: parseFloat(productFormState.sellPrice) || 0,
      low_stock_threshold: productFormState.lowStockThreshold || 5,
      image_url: productFormState.imageUrl || null,
      is_active: true,
    };

    let productId;
    if (productFormState.id) {
      productData.updated_at = new Date().toISOString();
      const { error } = await db.from('products').update(productData).eq('id', productFormState.id);
      if (error) throw error;
      productId = productFormState.id;
    } else {
      const { data, error } = await db.from('products').insert(productData).select().single();
      if (error) throw error;
      productId = data.id;
    }

    // Sync variants — add new, remove deselected
    const { data: existingVariants } = await db.from('product_variants')
      .select('id, size_id, color_id')
      .eq('product_id', productId)
      .eq('is_active', true);

    const wantedCombos = new Set();
    if (productFormState.selectedColors.length > 0 && productFormState.selectedSizes.length > 0) {
      for (const sizeId of productFormState.selectedSizes) {
        for (const colorId of productFormState.selectedColors) {
          wantedCombos.add(`${sizeId}|${colorId}`);

          // Create if doesn't exist
          const exists = (existingVariants || []).find(v => v.size_id === sizeId && v.color_id === colorId);
          if (!exists) {
            const size = APP.sizes.find(s => s.id === sizeId);
            const color = APP.colors.find(c => c.id === colorId);
            const variantSku = `${productFormState.sku || 'PRD'}-${size?.name || ''}-${color?.name || ''}`.toUpperCase().replace(/\s+/g, '');
            await db.from('product_variants').insert({
              product_id: productId,
              size_id: sizeId,
              color_id: colorId,
              stock_qty: 0,
              sku: variantSku,
              is_active: true,
            });
          }
        }
      }
    }

    // Remove variants that are no longer selected
    for (const v of (existingVariants || [])) {
      const key = `${v.size_id}|${v.color_id}`;
      if (!wantedCombos.has(key)) {
        // Check if variant was used in any sale
        const { data: usedInSale } = await db.from('sale_items').select('id').eq('variant_id', v.id).limit(1);
        if (usedInSale && usedInSale.length > 0) {
          // Soft delete — preserve for sales history
          await db.from('product_variants').update({ is_active: false }).eq('id', v.id);
        } else {
          // Hard delete — clean removal + its location_stock entries
          await db.from('location_stock').delete().eq('variant_id', v.id);
          await db.from('product_variants').delete().eq('id', v.id);
        }
      }
    }

    logActivity(productFormState.id ? 'update_product' : 'create_product', `${productFormState.id ? 'Updated' : 'Created'} product "${productFormState.name.trim()}"`, { referenceId: productId, metadata: { name: productFormState.name.trim(), sell_price: parseFloat(productFormState.sellPrice) || 0 } });

    closeModal('product-form-modal');
    showToast(productFormState.id ? 'Product updated!' : 'Product created!', 'success');
    await loadProducts();
    renderProductsList();
  } catch (err) {
    showToast('Save failed: ' + err.message, 'error');
  } finally {
    productFormState.saving = false;
  }
}

async function deleteProduct(productId) {
  if (!hasRole('admin', 'manager')) { showToast('You do not have permission to delete products', 'warning'); return; }
  openConfirmModal('Delete this product? This will hide it from all views.', async () => {
    try {
      await db.from('products').update({ is_active: false, updated_at: new Date().toISOString() }).eq('id', productId);
      closeModal('product-form-modal');
      showToast('Product deleted', 'success');
      await loadProducts();
      renderProductsList();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  });
}

async function loadActivityLog() {
  if (activityLogState.loading) return;
  activityLogState.loading = true;

  const list = $('activity-log-list');
  if (activityLogState.page === 0) {
    list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:40px;"><div class="spinner"></div></div>';
  }

  try {
    let query = db.from('activity_log')
      .select('*, staff:staff_id(name)')
      .order('created_at', { ascending: false })
      .range(activityLogState.page * activityLogState.pageSize, (activityLogState.page + 1) * activityLogState.pageSize - 1);

    if (activityLogState.staff !== 'all') {
      query = query.eq('staff_id', activityLogState.staff);
    }
    if (activityLogState.action !== 'all') {
      query = query.eq('action', activityLogState.action);
    }
    if (activityLogState.dateFrom) {
      query = query.gte('created_at', activityLogState.dateFrom + 'T00:00:00');
    }
    if (activityLogState.dateTo) {
      query = query.lte('created_at', activityLogState.dateTo + 'T23:59:59');
    }

    const { data, error } = await query;
    if (error) throw error;

    activityLogState.hasMore = (data || []).length === activityLogState.pageSize;

    if (activityLogState.page === 0) {
      activityLogState.data = data || [];
    } else {
      activityLogState.data = [...activityLogState.data, ...(data || [])];
    }

    renderActivityLog();
  } catch (err) {
    list.innerHTML = `<div style="color:var(--danger);padding:20px;text-align:center;">Error: ${err.message}</div>`;
  } finally {
    activityLogState.loading = false;
  }
}

function getActionBadge(action) {
  const map = {
    sale: { label: '💰 Sale', cls: 'badge-success' },
    void_sale: { label: '🚫 Void', cls: 'badge-danger' },
    restock: { label: '📦 Restock', cls: 'badge-info' },
    set_stock: { label: '🧮 Set Stock', cls: 'badge-warning' },
    transfer: { label: '🔄 Transfer', cls: 'badge-info' },
    closing: { label: '📊 Closing', cls: 'badge-success' },
    create_product: { label: '➕ Product', cls: 'badge-info' },
    update_product: { label: '✏️ Product', cls: 'badge-warning' },
    create_staff: { label: '👤 New Staff', cls: 'badge-info' },
    update_staff: { label: '👤 Edit Staff', cls: 'badge-warning' },
    enable_staff: { label: '✅ Enable', cls: 'badge-success' },
    disable_staff: { label: '⛔ Disable', cls: 'badge-danger' },
  };

function renderActivityLog() {
  const list = $('activity-log-list');
  if (activityLogState.data.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);font-size:14px;">No activity found for this filter</div>';
    return;
  }

  let lastDate = '';
  let html = '';
  activityLogState.data.forEach(log => {
    const dt = new Date(log.created_at);
    const dateStr = dt.toLocaleDateString('en-MY', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const timeStr = dt.toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true });

    if (dateStr !== lastDate) {
      html += `<div style="font-size:12px;font-weight:700;color:var(--accent);margin:${lastDate ? '16px' : '0'} 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);">${dateStr}</div>`;
      lastDate = dateStr;
    }

    const badge = getActionBadge(log.action);
    const staffName = log.staff?.name || 'System';
    html += `
      <div class="card" style="margin-bottom:6px;padding:12px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
              <span class="badge ${badge.cls}" style="font-size:11px;">${badge.label}</span>
              <span style="font-size:11px;color:var(--text-secondary);">${staffName}</span>
            </div>
            <div style="font-size:13px;color:var(--text-primary);line-height:1.4;word-break:break-word;">${log.description || '-'}</div>
          </div>
          <div style="font-size:11px;color:var(--text-secondary);white-space:nowrap;flex-shrink:0;">${timeStr}</div>
        </div>
      </div>
    `;
  });

  if (activityLogState.hasMore) {
    html += `<div style="text-align:center;padding:16px;"><button class="btn btn-outline btn-sm" onclick="activityLogState.page++;loadActivityLog()">Load More</button></div>`;
  }

  list.innerHTML = html;
}

function onActivityLogScroll(el) {
  if (!activityLogState.hasMore || activityLogState.loading) return;
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
    activityLogState.page++;
    loadActivityLog();
  }
}

let _reportState = {

let _reportCharts = {};

function _destroyReportCharts() {
  Object.keys(_reportCharts).forEach(function(k) {
    if (_reportCharts[k]) { try { _reportCharts[k].destroy(); } catch(e){} }
  });
  _reportCharts = {};
}

function _getDateRange(preset, customFrom, customTo) {
  const now = new Date();
  let from, to;
  if (preset === 'today') {
    from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    to = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
  } else if (preset === 'week') {
    const day = now.getDay();
    from = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
    to = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
  } else if (preset === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
  } else if (preset === 'custom' && customFrom && customTo) {
    from = new Date(customFrom + 'T00:00:00');
    to = new Date(customTo + 'T23:59:59.999');
  } else {
    from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    to = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
  }
  return { from: from.toISOString(), to: to.toISOString(), fromDate: from, toDate: to };
}

async function loadSalesReportData() {
  var body = $('sales-report-body');
  if (!body) return;
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:40px;"><div class="spinner spinner-lg"></div></div>';

  try {
    var range = _getDateRange(_reportState.datePreset, _reportState.dateFrom, _reportState.dateTo);

    var query = db.from('sales')
      .select('id, total, payment_method, location_id, staff_id, created_at, receipt_no, staff:staff(name)')
      .eq('status', 'completed')
      .gte('created_at', range.from)
      .lte('created_at', range.to)
      .order('created_at', { ascending: true });

    if (!hasRole('admin')) {
      var locIds = getAccessibleLocationIds();
      if (locIds.length > 0) query = query.in('location_id', locIds);
    }

    var result = await query;
    var sales = result.data || [];

    if (_reportState.locationId) {
      sales = sales.filter(function(s) { return s.location_id === _reportState.locationId; });
    }

    var saleIds = sales.map(function(s) { return s.id; });
    var items = [];
    if (saleIds.length > 0) {
      // Supabase .in() has a limit, batch if needed
      var batchSize = 200;
      for (var i = 0; i < saleIds.length; i += batchSize) {
        var batch = saleIds.slice(i, i + batchSize);
        var ir = await db.from('sale_items')
          .select('sale_id, product_name, variant_label, qty, unit_price, subtotal')
          .in('sale_id', batch);
        if (ir.data) items = items.concat(ir.data);
      }
    }

    _reportState.salesData = sales;
    _reportState.itemsData = items;
    _reportState._range = range;

    renderSalesReportBody(sales, items, range);
  } catch (err) {
    console.error('Report load error', err);
    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger);">Failed to load report data</div>';
  }
}

function renderSalesReportBody(sales, items, range) {
  var body = $('sales-report-body');
  if (!body) return;
  _destroyReportCharts();

  var totalSales = sales.reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var txCount = sales.length;
  var avgTx = txCount > 0 ? totalSales / txCount : 0;
  var cashTotal = sales.filter(function(s) { return s.payment_method === 'cash'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var qrTotal = sales.filter(function(s) { return s.payment_method === 'qr'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var cardTotal = sales.filter(function(s) { return s.payment_method === 'card'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);

  // Top products
  var productMap = {};
  items.forEach(function(it) {
    var key = it.product_name;
    if (!productMap[key]) productMap[key] = { name: key, qty: 0, revenue: 0 };
    productMap[key].qty += it.qty || 0;
    productMap[key].revenue += parseFloat(it.subtotal) || 0;
  });
  var topProducts = Object.values(productMap).sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 5);

  // Top staff
  var staffMap = {};
  sales.forEach(function(s) {
    var name = (s.staff && s.staff.name) ? s.staff.name : 'Unknown';
    var sid = s.staff_id || 'unknown';
    if (!staffMap[sid]) staffMap[sid] = { name: name, transactions: 0, revenue: 0 };
    staffMap[sid].transactions++;
    staffMap[sid].revenue += parseFloat(s.total) || 0;
  });
  var topStaff = Object.values(staffMap).sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 5);

  // Daily aggregation for chart
  var dailyMap = {};
  sales.forEach(function(s) {
    var d = new Date(s.created_at).toISOString().slice(0, 10);
    if (!dailyMap[d]) dailyMap[d] = 0;
    dailyMap[d] += parseFloat(s.total) || 0;
  });
  var dailyLabels = Object.keys(dailyMap).sort();
  var dailyValues = dailyLabels.map(function(d) { return dailyMap[d]; });
  // Format labels shorter
  var dailyDisplayLabels = dailyLabels.map(function(d) {
    var parts = d.split('-');
    return parts[2] + '/' + parts[1];

function renderDailySalesChart(labels, values) {
  var canvas = $('report-daily-chart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  _reportCharts.daily = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Sales (RM)',
        data: values,
        backgroundColor: '#c9a84c',
        borderRadius: 4,
        borderSkipped: false,
        maxBarThickness: 40
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) { return 'RM ' + ctx.parsed.y.toFixed(2); }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#7a9a7e', font: { size: 10 } }
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: {
            color: '#7a9a7e',
            font: { size: 10 },
            callback: function(val) { return 'RM ' + val; }
          }
        }
      }
    }
  });
}

function renderPaymentChart(cashTotal, qrTotal, cardTotal) {
  var canvas = $('report-payment-chart');
  if (!canvas) return;
  if (cashTotal === 0 && qrTotal === 0 && cardTotal === 0) {
    canvas.parentElement.innerHTML = '<div style="text-align:center;color:var(--text-secondary);font-size:12px;padding:20px;">No data</div>';
    return;
  }
  var ctx = canvas.getContext('2d');
  _reportCharts.payment = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Cash', 'QR', 'Card'],
      datasets: [{
        data: [cashTotal, qrTotal, cardTotal],
        backgroundColor: ['#4ade80', '#60a5fa', '#fbbf24'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#e8e6d8',
            padding: 16,
            font: { size: 12 }
          }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
              var pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
              return ctx.label + ': RM ' + ctx.parsed.toFixed(2) + ' (' + pct + '%)';
            }
          }
        }
      }
    }
  });
}

function exportSalesCSV() {
  var sales = _reportState.salesData;
  if (!sales || sales.length === 0) { alert('No data to export'); return; }

  var rows = [['Date', 'Receipt No', 'Staff', 'Location', 'Payment Method', 'Total']];
  var locs = APP.stockLocations;
  sales.forEach(function(s) {
    var locName = '';
    for (var i = 0; i < locs.length; i++) {
      if (locs[i].id === s.location_id) { locName = locs[i].name; break; }
    }
    rows.push([
      new Date(s.created_at).toLocaleDateString('en-MY'),
      s.receipt_no || '',
      (s.staff && s.staff.name) ? s.staff.name : '',
      locName,
      s.payment_method || '',
      (parseFloat(s.total) || 0).toFixed(2)
    ]);
  });

  var csv = rows.map(function(r) {
    return r.map(function(c) {
      var str = String(c).replace(/"/g, '""');
      return '"' + str + '"';
    }).join(',');
  }).join('\n');

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'sales_report_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportSalesPDF() {
  var sales = _reportState.salesData;
  var items = _reportState.itemsData;
  if (!sales || sales.length === 0) { alert('No data to export'); return; }

  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF();

  var totalSales = sales.reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var txCount = sales.length;
  var avgTx = txCount > 0 ? totalSales / txCount : 0;
  var cashTotal = sales.filter(function(s) { return s.payment_method === 'cash'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var qrTotal = sales.filter(function(s) { return s.payment_method === 'qr'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);
  var cardTotal = sales.filter(function(s) { return s.payment_method === 'card'; }).reduce(function(s, r) { return s + (parseFloat(r.total) || 0); }, 0);

  var range = _reportState._range;
  var fromStr = range ? new Date(range.from).toLocaleDateString('en-MY') : '';
  var toStr = range ? new Date(range.to).toLocaleDateString('en-MY') : '';

  doc.setFontSize(18);
  doc.text('Sales Report', 14, 22);
  doc.setFontSize(10);
  doc.setTextColor(100);
  doc.text('Date Range: ' + fromStr + ' - ' + toStr, 14, 30);
  doc.text('Generated: ' + new Date().toLocaleString('en-MY'), 14, 36);

  doc.setFontSize(12);
  doc.setTextColor(0);
  doc.text('Summary', 14, 48);
  doc.setFontSize(10);
  doc.text('Total Sales: RM ' + totalSales.toFixed(2), 14, 56);
  doc.text('Transactions: ' + txCount, 14, 62);
  doc.text('Avg/Transaction: RM ' + avgTx.toFixed(2), 14, 68);
  doc.text('Cash: RM ' + cashTotal.toFixed(2) + '  |  QR: RM ' + qrTotal.toFixed(2) + '  |  Card: RM ' + cardTotal.toFixed(2), 14, 74);

  // Top products
  var productMap = {};
  (items || []).forEach(function(it) {
    var key = it.product_name;
    if (!productMap[key]) productMap[key] = { name: key, qty: 0, revenue: 0 };
    productMap[key].qty += it.qty || 0;
    productMap[key].revenue += parseFloat(it.subtotal) || 0;
  });
  var topProducts = Object.values(productMap).sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 5);

  var y = 86;
  doc.setFontSize(12);
  doc.text('Top 5 Products', 14, y);
  y += 8;
  doc.setFontSize(9);
  doc.setTextColor(100);
  doc.text('#', 14, y); doc.text('Product', 24, y); doc.text('Qty', 130, y); doc.text('Revenue', 155, y);
  y += 2;
  doc.setDrawColor(200);
  doc.line(14, y, 196, y);
  y += 6;
  doc.setTextColor(0);
  topProducts.forEach(function(p, i) {
    doc.text(String(i + 1), 14, y);
    doc.text(p.name.substring(0, 40), 24, y);
    doc.text(String(p.qty), 130, y);
    doc.text('RM ' + p.revenue.toFixed(2), 155, y);
    y += 6;
  });

  // Top staff
  var staffMap = {};
  sales.forEach(function(s) {
    var name = (s.staff && s.staff.name) ? s.staff.name : 'Unknown';
    var sid = s.staff_id || 'unknown';
    if (!staffMap[sid]) staffMap[sid] = { name: name, transactions: 0, revenue: 0 };
    staffMap[sid].transactions++;
    staffMap[sid].revenue += parseFloat(s.total) || 0;
  });
  var topStaff = Object.values(staffMap).sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 5);

  y += 4;
  doc.setFontSize(12);
  doc.text('Top 5 Staff', 14, y);
  y += 8;
  doc.setFontSize(9);
  doc.setTextColor(100);
  doc.text('#', 14, y); doc.text('Name', 24, y); doc.text('Txns', 130, y); doc.text('Revenue', 155, y);
  y += 2;
  doc.line(14, y, 196, y);
  y += 6;
  doc.setTextColor(0);
  topStaff.forEach(function(s, i) {
    doc.text(String(i + 1), 14, y);
    doc.text(s.name.substring(0, 40), 24, y);
    doc.text(String(s.transactions), 130, y);
    doc.text('RM ' + s.revenue.toFixed(2), 155, y);
    y += 6;
  });

  doc.save('sales_report_' + new Date().toISOString().slice(0,10) + '.pdf');
}

function setStockReportLocation(locId) {
  _reportState.stockLocationId = locId;
  renderStockReport();
}

function renderStockReport() {
  var container = $('reports-content');
  if (!container) return;

  var locs = getAccessibleLocations();
  var selLocId = _reportState.stockLocationId || (locs.length > 0 ? locs[0].id : null);
  _reportState.stockLocationId = selLocId;

  var products = APP.products || [];
  var totalProducts = products.length;
  var totalUnits = 0;
  var lowStockCount = 0;
  var outOfStockCount = 0;
  var productRows = [];

  products.forEach(function(p) {
    var variants = p.variants || [];
    var threshold = p.low_stock_threshold || 5;
    variants.forEach(function(v) {
      var qty = selLocId ? getLocationStockQty(selLocId, v.id) : getAllLocationsStockQty(v.id);
      totalUnits += qty;
      var status = 'OK';
      var statusColor = 'var(--success)';
      if (qty <= 0) { status = 'Out'; statusColor = 'var(--danger)'; outOfStockCount++; }
      else if (qty <= threshold) { status = 'Low'; statusColor = 'var(--warning)'; lowStockCount++; }
      var sizeName = (v.size && v.size.name) ? v.size.name : '';
      var colorName = (v.color && v.color.name) ? v.color.name : '';
      var variantLabel = [sizeName, colorName].filter(Boolean).join(' / ') || '-';
      productRows.push({
        productName: p.name,
        variant: variantLabel,
        qty: qty,
        status: status,
        statusColor: statusColor
      });
    });
  });

  container.innerHTML = '<div style="padding:16px;">' +
    // Location chips
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">' +
      locs.map(function(l) {
        return '<div class="chip ' + (l.id === selLocId ? 'active' : '') + '" style="cursor:pointer;font-size:12px;padding:6px 12px;" onclick="setStockReportLocation(\'' + l.id + '\')">' + l.name + '</div>';
      }).join('') +
    '</div>' +

    // Summary cards
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">' +
      '<div class="card" style="padding:14px;border-radius:12px;">' +
        '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">Total Products</div>' +
        '<div style="font-size:20px;font-weight:700;">' + totalProducts + '</div>' +
      '</div>' +
      '<div class="card" style="padding:14px;border-radius:12px;">' +
        '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">Total Units</div>' +
        '<div style="font-size:20px;font-weight:700;">' + totalUnits + '</div>' +
      '</div>' +
      '<div class="card" style="padding:14px;border-radius:12px;">' +
        '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">Low Stock Alerts</div>' +
        '<div style="font-size:20px;font-weight:700;color:var(--warning);">' + lowStockCount + '</div>' +
      '</div>' +
      '<div class="card" style="padding:14px;border-radius:12px;">' +
        '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">Out of Stock</div>' +
        '<div style="font-size:20px;font-weight:700;color:var(--danger);">' + outOfStockCount + '</div>' +
      '</div>' +
    '</div>' +

    // Stock table
    '<div class="card" style="padding:16px;border-radius:12px;margin-bottom:16px;">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:12px;">Stock by Product</div>' +
      (productRows.length === 0 ? '<div style="color:var(--text-secondary);font-size:12px;">No products</div>' :
      '<div style="overflow-x:auto;">' +
      '<table style="width:100%;font-size:12px;border-collapse:collapse;">' +
        '<thead><tr style="color:var(--text-secondary);text-align:left;border-bottom:1px solid var(--border);">' +
          '<th style="padding:6px 4px;">Product</th><th style="padding:6px 4px;">Variant</th><th style="padding:6px 4px;text-align:right;">Qty</th><th style="padding:6px 4px;text-align:center;">Status</th>' +
        '</tr></thead><tbody>' +
        productRows.map(function(r) {
          return '<tr style="border-bottom:1px solid var(--border);">' +
            '<td style="padding:6px 4px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + r.productName + '</td>' +
            '<td style="padding:6px 4px;color:var(--text-secondary);">' + r.variant + '</td>' +
            '<td style="padding:6px 4px;text-align:right;font-weight:600;">' + r.qty + '</td>' +
            '<td style="padding:6px 4px;text-align:center;"><span class="badge" style="background:' + r.statusColor + ';color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;">' + r.status + '</span></td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div>') +
    '</div>' +

    // Export button
    '<div style="margin-bottom:16px;">' +
      '<button class="btn btn-outline" style="width:100%;font-size:13px;" onclick="exportStockCSV()"><i data-lucide="download" style="width:14px;height:14px;"></i> Export CSV</button>' +
    '</div>' +
  '</div>';

  lucide.createIcons({ nameAttr: 'data-lucide' });
}

function exportStockCSV() {
  var locs = getAccessibleLocations();
  var selLocId = _reportState.stockLocationId;
  var locName = '';
  for (var i = 0; i < locs.length; i++) {
    if (locs[i].id === selLocId) { locName = locs[i].name; break; }
  }

  var products = APP.products || [];
  var rows = [['Product', 'Variant', 'Location', 'Qty', 'Status']];

  products.forEach(function(p) {
    var variants = p.variants || [];

    variants.forEach(function(v) {
      var qty = selLocId ? getLocationStockQty(selLocId, v.id) : getAllLocationsStockQty(v.id);
      var status = qty <= 0 ? 'Out' : qty <= threshold ? 'Low' : 'OK';
      var sizeName = (v.size && v.size.name) ? v.size.name : '';

let staffFormState = { id: null, name: '', pin: '', confirmPin: '', role: 'staff', assignedLocations: [] };

async function openStaffForm(staffId) {
  if (staffId) {
    const { data } = await db.from('staff').select('*').eq('id', staffId).single();
    if (data) {
      const locs = await loadStaffLocations(data.id);
      staffFormState = { id: data.id, name: data.name, pin: data.pin, confirmPin: data.pin, role: data.role || 'staff', assignedLocations: locs };
      renderStaffForm();
    }
  } else {
    staffFormState = { id: null, name: '', pin: '', confirmPin: '', role: 'staff', assignedLocations: APP.stockLocations.map(l => l.id) };
    renderStaffForm();
  }
}

function renderStaffForm() {
  const isEdit = !!staffFormState.id;
  const html = `
    <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <div style="cursor:pointer;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-highlight);" onclick="closeModal('staff-form-modal')">
        <i data-lucide="arrow-left" style="width:18px;height:18px;color:var(--text-primary);"></i>
      </div>
      <h2 style="font-size:16px;font-weight:700;">${isEdit ? 'Edit' : 'Add'} Staff</h2>
    </div>
    <div class="scrollable" style="flex:1;padding:20px;padding-bottom:calc(20px + var(--safe-bottom));">
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Name</label>
        <input type="text" class="input" placeholder="Staff name" value="${staffFormState.name}" oninput="staffFormState.name=this.value">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">PIN</label>
        <input type="password" class="input" placeholder="6-digit PIN" maxlength="6" value="${staffFormState.pin}" oninput="staffFormState.pin=this.value">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Confirm PIN</label>
        <input type="password" class="input" placeholder="Confirm PIN" maxlength="6" value="${staffFormState.confirmPin}" oninput="staffFormState.confirmPin=this.value">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Role</label>
        <select class="input" onchange="staffFormState.role=this.value">
          <option value="staff" ${staffFormState.role === 'staff' ? 'selected' : ''}>Staff (Cashier)</option>
          <option value="accountant" ${staffFormState.role === 'accountant' ? 'selected' : ''}>Accountant</option>
          <option value="manager" ${staffFormState.role === 'manager' ? 'selected' : ''}>Manager</option>
          <option value="admin" ${staffFormState.role === 'admin' ? 'selected' : ''}>Admin</option>
        </select>
      </div>
      <div style="margin-bottom:20px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Assigned Locations *</label>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${APP.stockLocations.map(loc => `
            <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-highlight);border-radius:8px;cursor:pointer;">
              <input type="checkbox" ${staffFormState.assignedLocations.includes(loc.id) ? 'checked' : ''} onchange="toggleStaffLocation('${loc.id}', this.checked)" style="width:18px;height:18px;accent-color:var(--primary);">
              <span style="font-size:14px;font-weight:500;">📍 ${loc.name}</span>
            </label>
          `).join('')}
        </div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:6px;">Staff can only access data from assigned locations</div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="saveStaff()">Save Staff</button>
    </div>
  `;
  const existing = $('staff-form-modal');
  if (existing) { existing.innerHTML = html; lucide.createIcons({ nameAttr: 'data-lucide', attrs: {}, icons: {}, parentNode: existing }); } else { openModal(html, 'sheet', 'staff-form-modal'); }
}

function toggleStaffLocation(locId, checked) {
  if (checked) {
    if (!staffFormState.assignedLocations.includes(locId)) staffFormState.assignedLocations.push(locId);
  } else {
    staffFormState.assignedLocations = staffFormState.assignedLocations.filter(id => id !== locId);
  }
}

async function saveStaff() {
  if (!staffFormState.name.trim()) { showToast('Name is required', 'warning'); return; }
  if (!staffFormState.pin) { showToast('PIN is required', 'warning'); return; }
  if (staffFormState.pin.length !== 6 || !/^\d{6}$/.test(staffFormState.pin)) { showToast('PIN must be exactly 6 digits', 'warning'); return; }
  if (staffFormState.pin !== staffFormState.confirmPin) { showToast('PINs do not match', 'error'); return; }
  if (staffFormState.assignedLocations.length === 0) { showToast('Assign at least one location', 'warning'); return; }

  try {
    const staffData = { name: staffFormState.name.trim(), pin: staffFormState.pin, role: staffFormState.role };
    let staffId = staffFormState.id;

    if (staffId) {
      staffData.updated_at = new Date().toISOString();
      const { error } = await db.from('staff').update(staffData).eq('id', staffId);
      if (error) throw error;
    } else {
      staffData.is_active = true;
      const { data, error } = await db.from('staff').insert(staffData).select('id').single();
      if (error) throw error;
      staffId = data.id;
    }

    // Save assigned locations
    await db.from('staff_locations').delete().eq('staff_id', staffId);
    const locRows = staffFormState.assignedLocations.map(locId => ({ staff_id: staffId, location_id: locId }));
    if (locRows.length > 0) {
      const { error: locErr } = await db.from('staff_locations').insert(locRows);
      if (locErr) throw locErr;
    }

    logActivity(staffFormState.id ? 'update_staff' : 'create_staff', `${staffFormState.id ? 'Updated' : 'Created'} staff "${staffFormState.name.trim()}"`, { referenceId: staffId, metadata: { name: staffFormState.name.trim(), role: staffFormState.role } });

    closeModal('staff-form-modal');
    showToast('Staff saved!', 'success');
    openStaffManagement();
  } catch (err) { showToast('Save failed: ' + err.message, 'error'); }
}

  const { error } = await db.from('stock_locations').update({ is_active: newState }).eq('id', locId);
  if (error) { showToast('Failed to update', 'error'); return; }
  showToast(newState ? 'Location enabled' : 'Location disabled', 'success');
  await loadLocationList();
}

async function deleteLocation(locId) {
  if (!confirm('Delete this location? Stock records at this location will be removed.')) return;
  const { error } = await db.from('stock_locations').delete().eq('id', locId);
  if (error) { showToast('Failed to delete: ' + error.message, 'error'); return; }
  showToast('Location deleted', 'success');
  await loadLocationList();
}

// ===================== RECEIPT SETTINGS =====================
let storeSettingsState = { receipt_footer: '', store_name: '' };

async function openStoreSettings() {
  storeSettingsState = {
    receipt_footer: APP.settings.receipt_footer || 'Thank you for shopping with us!',
    store_name: APP.settings.store_name || 'Sayyida Khadeeja Apparel',
  };

  const html = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <h2 style="font-size:18px;font-weight:700;">🧾 Receipt Settings</h2>
      <div style="cursor:pointer;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-highlight);" onclick="closeModal('settings-modal')">✕</div>
    </div>
    <div class="scrollable" style="flex:1;padding:16px;">
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Store Name</label>
        <input type="text" class="input" value="${storeSettingsState.store_name}" oninput="storeSettingsState.store_name=this.value">
      </div>
      <div style="margin-bottom:16px;padding:10px;border-radius:8px;background:var(--surface-highlight);">
        <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;">📍 Branch on Receipt</div>
        <div style="font-size:12px;color:var(--text-secondary);">Automatically set from the POS location where the sale is made.</div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Receipt Footer Message</label>
        <textarea class="input" rows="3" style="resize:none;" oninput="storeSettingsState.receipt_footer=this.value">${storeSettingsState.receipt_footer}</textarea>
      </div>
    </div>
    <div style="padding:16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(16px + var(--safe-bottom));">
      <button class="btn btn-primary btn-block btn-lg" onclick="saveStoreSettings()">Save Settings</button>
    </div>
  `;
  openModal(html, 'fullscreen', 'settings-modal');
}

async function saveStoreSettings() {
  try {
    const settings = [
      { key: 'store_name', value: JSON.stringify(storeSettingsState.store_name) },
      { key: 'receipt_footer', value: JSON.stringify(storeSettingsState.receipt_footer) },
    ];
    for (const s of settings) {
      await db.from('app_settings').upsert({ key: s.key, value: JSON.parse(s.value), updated_at: new Date().toISOString() }, { onConflict: 'key' });
    }
    APP.settings.store_name = storeSettingsState.store_name;
    APP.settings.receipt_footer = storeSettingsState.receipt_footer;
    closeModal('settings-modal');
    showToast('Settings saved!', 'success');
  } catch (err) { showToast('Save failed: ' + err.message, 'error'); }
}

// ===================== MULTI-DEVICE SYNC =====================
let _syncChannel = null;
let _syncStatus = 'disconnected';
let _lastSyncTime = null;
let _syncDebounceTimer = null;

function initRealtimeSync() {
  if (_syncChannel) { db.removeChannel(_syncChannel); }
  _syncChannel = db.channel('app-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sales' }, (p) => debouncedSync('sales', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sale_items' }, (p) => debouncedSync('sale_items', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'location_stock' }, (p) => debouncedSync('location_stock', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (p) => debouncedSync('products', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'product_variants' }, (p) => debouncedSync('product_variants', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'categories' }, (p) => debouncedSync('categories', p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'staff' }, (p) => handleStaffSync(p))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'daily_closings' }, (p) => debouncedSync('daily_closings', p))
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') { _syncStatus = 'connected'; }
      else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') { _syncStatus = 'disconnected'; }
      updateSyncIndicator();
    });
}

function debouncedSync(table, payload) {
  clearTimeout(_syncDebounceTimer);
  _syncDebounceTimer = setTimeout(() => handleSyncRefresh(table), 500);
}

async function handleStaffSync(payload) {
  if (payload.eventType === 'UPDATE' && payload.new && payload.new.id === APP.currentStaff?.id) {
    if (!payload.new.is_active) {
      showToast('Your account has been disabled by admin', 'error');
      setTimeout(() => logout(), 1500);
      return;
    }
    APP.currentStaff = { ...APP.currentStaff, ...payload.new };
    APP.currentStaff.assignedLocations = await loadStaffLocations(payload.new.id);
  }
  debouncedSync('staff', payload);
}

async function handleSyncRefresh(table) {
  if (!APP.currentStaff) return;
  _syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    if (['products', 'product_variants', 'categories'].includes(table)) {
      await loadAppData();
      await loadProducts();
      await loadLocationStock();
    } else if (['location_stock', 'sales', 'sale_items'].includes(table)) {
      await loadLocationStock();
    }
    await refreshCurrentScreen();
    _lastSyncTime = new Date();
    _syncStatus = 'connected';
  } catch (e) {
    console.warn('Sync refresh failed:', e);
    _syncStatus = 'connected';
  }
  updateSyncIndicator();
}

async function refreshCurrentScreen() {
  switch (APP.currentScreen) {
    case 'home': await renderHomeScreen(); break;
    case 'pos': await loadLocationStock(); await renderPOSScreen(); break;
    case 'stock': await renderStockScreen(); break;
    case 'products': await renderProductsScreen(); break;
  }
}

function initVisibilitySync() {
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && APP.currentStaff) {
      await syncOnResume();
    }
  });
}

let _resumeSyncing = false;
async function syncOnResume() {
  if (_resumeSyncing) return;
  _resumeSyncing = true;
  _syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    await loadAppData();
    await loadProducts();
    await loadLocationStock();
    await refreshCurrentScreen();
    _lastSyncTime = new Date();
    _syncStatus = 'connected';
    if (!_syncChannel || _syncChannel.state !== 'joined') {
      initRealtimeSync();
    }
  } catch (e) {
    console.warn('Resume sync failed:', e);
    _syncStatus = 'disconnected';
  }
  _resumeSyncing = false;
  updateSyncIndicator();
}

function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const cfg = {
    connected: { color: '#22c55e', label: '● Synced', anim: '' },
    syncing: { color: '#f59e0b', label: '● Syncing...', anim: 'animation:pulse 1s infinite;' },
    disconnected: { color: '#ef4444', label: '● Offline', anim: '' },
    offline: { color: '#6b7280', label: '● No Network', anim: '' }
  };
  const s = cfg[_syncStatus] || cfg.disconnected;
  el.innerHTML = `<div style="font-size:10px;font-weight:600;color:${s.color};${s.anim}letter-spacing:0.3px;">${s.label}</div>`;
}

function initNetworkSync() {
  window.addEventListener('online', () => {
    if (_syncStatus === 'offline' || _syncStatus === 'disconnected') {
      initRealtimeSync();
      syncOnResume();
    }
  });
  window.addEventListener('offline', () => {
    _syncStatus = 'offline';
    updateSyncIndicator();
  });
}

function cleanupSync() {
  if (_syncChannel) { db.removeChannel(_syncChannel); _syncChannel = null; }
  _syncStatus = 'disconnected';
  updateSyncIndicator();
}

// ===================== APP INITIALIZATION =====================
async function initApp() {
  initLogin();
  initVisibilitySync();
  initNetworkSync();
  const restored = await tryRestoreSession();
  if (restored) {
    $('login-screen').style.display = 'none';
    $('main-app').style.display = 'flex';
    await loadAppData();
    await loadProducts();
    await loadLocationStock();
    initRealtimeSync();
    navigate('home');
  }
}

// Start the app
document.addEventListener('DOMContentLoaded', initApp);

// ===================== PWA SERVICE WORKER REGISTRATION =====================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        console.log('[PWA] Service Worker registered, scope:', reg.scope);
        // Check for updates periodically
        setInterval(() => reg.update(), 60 * 60 * 1000); // every hour
        // Notify user when a new version is available
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
              showToast('App updated! Refresh for the latest version.', 'info');
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });
}
